---
- name: Backup Huawei Switch Configuration
  hosts: 192.168.100.15
  gather_facts: no
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: community.netcommon.huawei
    backup_dir: "./backups/{{ inventory_hostname }}"
    filename: "config_{{ inventory_hostname }}_{{ ansible_date_time.date }}.cfg"
    ftp_server: "192.168.100.64"
    ftp_user: "ftpuser"
    ftp_pass: "ftpuser"

  tasks:
    - name: Ensure local backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
      delegate_to: localhost

    - name: Run display current-configuration
      ansible.netcommon.cli_command:
        command: display current-configuration
      register: config_output

    - name: Save configuration to local file
      copy:
        content: "{{ config_output.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ filename }}"
      delegate_to: localhost

    - name: Transfer backup to FTP server
      shell: |
        ftp -n {{ ftp_server }} <<EOF
        user {{ ftp_user }} {{ ftp_pass }}
        put {{ backup_dir }}/{{ filename }} /network_backups/{{ filename }}
        bye
        EOF
      delegate_to: localhost
      register: ftp_result
      failed_when: ftp_result.rc != 0
